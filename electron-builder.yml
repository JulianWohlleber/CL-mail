appId: com.mail.app
productName: mail_
directories:
  buildResources: resources
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.*'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.*.json}'
mac:
  category: public.app-category.productivity
  entitlementsInherit: resources/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Not required
    NSCameraUsageDescription: Not required
    # Contacts autocomplete for recipients. MAS build uses the native Contacts
    # framework; the Developer-ID build automates Contacts.app via osascript.
    NSContactsUsageDescription: mail_ suggests recipients from your contacts as you type. This stays on your Mac.
    NSAppleEventsUsageDescription: mail_ reads your contacts to suggest recipients as you type.
  notarize: false
  target:
    - dmg
    - zip
  artifactName: ${name}-${version}-${arch}.${ext}
dmg:
  artifactName: ${name}-${version}.${ext}

# ── Mac App Store target ────────────────────────────────────────────────────
# Build with:  npx electron-builder --mac mas
# Prerequisites (see docs/APP_STORE.md):
#   • Apple Developer Program membership
#   • Certificates: "Apple Distribution" + "Mac Installer Distribution" (or
#     "3rd Party Mac Developer Application/Installer" on older accounts)
#   • App ID com.mail.app registered with App Sandbox + App Groups capabilities
#   • A Mac App Store provisioning profile at resources/embedded.provisionprofile
#   • Replace TEAMID in resources/entitlements.mas.plist with your Team ID
# NOTE: several features are sandbox-incompatible and must be gated out of the
# MAS build first (Apple Mail / Mailspring import, macOS Contacts autocomplete,
# direct vault-path writes). See docs/APP_STORE.md → "Sandbox audit".
mas:
  category: public.app-category.productivity
  entitlements: resources/entitlements.mas.plist
  entitlementsInherit: resources/entitlements.mas.inherit.plist
  hardenedRuntime: false          # MAS uses the App Sandbox, not the hardened runtime
  provisioningProfile: resources/embedded.provisionprofile
# For local testing before submission, a development MAS build (installs on your
# own Mac without going through review) uses a "Mac Installer Development" +
# "Apple Development" cert and a development provisioning profile:
masDev:
  type: development
  entitlements: resources/entitlements.mas.plist
  entitlementsInherit: resources/entitlements.mas.inherit.plist
  provisioningProfile: resources/development.provisionprofile
